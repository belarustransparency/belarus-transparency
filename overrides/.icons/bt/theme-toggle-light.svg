<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24">
  <defs>
    <clipPath id="lh"><rect x="2" y="2" width="10" height="20"/></clipPath>
    <clipPath id="rh"><rect x="12" y="2" width="10" height="20"/></clipPath>
  </defs>
  <!-- Левая половина: только тонкая рамка -->
  <rect x="2" y="2" width="10" height="20" fill="none" stroke="#0A0A0A" stroke-width="1"/>
  <!-- Правая половина: сплошная тёмная -->
  <rect x="12" y="2" width="10" height="20" fill="#141413"/>
  <!-- T левая (тёмная на светлом) -->
  <g clip-path="url(#lh)">
    <rect x="6" y="5.5" width="12" height="2.2" fill="#0A0A0A"/>
    <rect x="10.9" y="5.5" width="2.2" height="13" fill="#0A0A0A"/>
    <rect x="6" y="5.5" width="1.8" height="3" fill="#0A0A0A"/>
    <rect x="16.2" y="5.5" width="1.8" height="3" fill="#0A0A0A"/>
    <rect x="9" y="17" width="6" height="1.8" fill="#0A0A0A"/>
  </g>
  <!-- T правая (светлая на тёмном) -->
  <g clip-path="url(#rh)">
    <rect x="6" y="5.5" width="12" height="2.2" fill="#F7F5F0"/>
    <rect x="10.9" y="5.5" width="2.2" height="13" fill="#F7F5F0"/>
    <rect x="6" y="5.5" width="1.8" height="3" fill="#F7F5F0"/>
    <rect x="16.2" y="5.5" width="1.8" height="3" fill="#F7F5F0"/>
    <rect x="9" y="17" width="6" height="1.8" fill="#F7F5F0"/>
  </g>
</svg>
