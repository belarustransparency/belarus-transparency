<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24">
  <defs>
    <clipPath id="lh"><rect x="2" y="2" width="10" height="20"/></clipPath>
    <clipPath id="rh"><rect x="12" y="2" width="10" height="20"/></clipPath>
  </defs>
  <!-- Кирпичная акцент-черта -->
  <line x1="0" y1="4" x2="0" y2="20" stroke="#B8341E" stroke-width="1.5"/>
  <!-- Две половины фона -->
  <rect x="2" y="2" width="10" height="20" fill="#F7F5F0"/>
  <rect x="12" y="2" width="10" height="20" fill="#2A2A28"/>
  <!-- Буква T левая (тёмная на светлом) -->
  <g clip-path="url(#lh)">
    <rect x="5.5" y="5.5" width="13" height="3" fill="#4A4A4A"/>
    <rect x="10.5" y="5.5" width="3" height="13" fill="#4A4A4A"/>
    <rect x="5.5" y="5.5" width="2.2" height="3.5" fill="#4A4A4A"/>
    <rect x="16.3" y="5.5" width="2.2" height="3.5" fill="#4A4A4A"/>
    <rect x="8" y="16.5" width="8" height="2.2" fill="#4A4A4A"/>
  </g>
  <!-- Буква T правая (светлая на тёмном) -->
  <g clip-path="url(#rh)">
    <rect x="5.5" y="5.5" width="13" height="3" fill="#C8C8C8"/>
    <rect x="10.5" y="5.5" width="3" height="13" fill="#C8C8C8"/>
    <rect x="5.5" y="5.5" width="2.2" height="3.5" fill="#C8C8C8"/>
    <rect x="16.3" y="5.5" width="2.2" height="3.5" fill="#C8C8C8"/>
    <rect x="8" y="16.5" width="8" height="2.2" fill="#C8C8C8"/>
  </g>
</svg>
