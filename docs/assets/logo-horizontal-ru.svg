<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 540 60" role="img" aria-label="Belarus Transparency — Исследовательский проект">
  <title>Belarus Transparency</title>
  <desc>Belarus Transparency — Исследовательский проект</desc>

  <!-- Знак: чёрная полоса (редактура) + кирпичная (вскрытое) -->
  <rect x="0" y="2" width="60" height="22" fill="#0A0A0A"/>
  <rect x="0" y="28" width="36" height="22" fill="#B8341E"/>

  <!-- Вертикальный разделитель -->
  <line x1="76" y1="2" x2="76" y2="50" stroke="#0A0A0A" stroke-width="0.5"/>

  <!-- Название -->
  <text x="92" y="20"
        font-family="'DejaVu Sans Mono', ui-monospace, 'SF Mono', Menlo, Consolas, 'Liberation Mono', monospace"
        font-size="17" font-weight="500" fill="#0A0A0A">Belarus Transparency</text>

  <!-- Подзаголовок (трекинг 0.4em растягивает до правой границы названия) -->
  <text x="92" y="45"
        font-family="'DejaVu Sans Mono', ui-monospace, 'SF Mono', Menlo, Consolas, 'Liberation Mono', monospace"
        font-size="10" fill="#6B6B6B"
        letter-spacing="2.62">ИССЛЕДОВАТЕЛЬСКИЙ ПРОЕКТ</text>
</svg>
