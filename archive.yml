# Витрина архива первичных документов — данные.
#
# Каждый документ — блок под `- id:`.
# id должен совпадать с именем .md-файла карточки документа во всех локалях:
#   docs/<lang>/archive/<id>.md
#
# Подход к названиям:
#   title_original   — название документа на языке оригинала (НЕ локализуется).
#   lang_original    — технический язык документа (pl, en, ru, de, ...).
#                      На витрине, открытой в той же локали — перевод не показывается.
#   title_translated — ОПЦИОНАЛЬНЫЕ переводы. Показываются мелким шрифтом
#                      под оригиналом, если язык витрины ≠ lang_original.
#                      Если перевода нет — отображается только оригинал.
#
# Локализуемые поля: title_translated, source_label (для "не зафиксирован").
# Не локализуются:   id, title_original, lang_original, year, type, source_domain.
#
# type — фильтр-категория: pdf | screenshot | webpage | video | other
#
# Порядок блоков = порядок на витрине (свежее — сверху).

documents:

