<style>
  :root {
    --bg: #f5f1e8;
    --bg-card: #faf7ef;
    --bg-hover: #ebe6d8;
    --border: #e0dccf;
    --border-soft: #e8e3d4;
    --border-strong: #d4d0c4;
    --text: #1a1a1a;
    --text-muted: #6b6b66;
    --text-faint: #8a8478;
    --accent: #1c3d6e;
    --accent-soft: #e4ecf5;
  }

  * { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    font-family: 'IBM Plex Sans', -apple-system, sans-serif;
    background: var(--bg);
    color: var(--text);
    min-height: 100vh;
    line-height: 1.5;
    font-size: 14px;
    padding: 40px 32px 60px;
  }

  .container { max-width: 1400px; margin: 0 auto; }

  /* === Шапка === */
  .masthead {
    padding-bottom: 14px;
    margin-bottom: 24px;
    border-bottom: 2px solid var(--text);
    display: flex;
    align-items: flex-end;
    justify-content: space-between;
    gap: 24px;
    flex-wrap: wrap;
  }
  .masthead-left {
    display: flex;
    flex-direction: column;
    gap: 6px;
  }
  .masthead-title {
    font-family: 'IBM Plex Serif', serif;
    font-weight: 700;
    font-size: 34px;
    letter-spacing: -0.025em;
    line-height: 1;
  }
  .masthead-title .dot { color: var(--accent); }
  .masthead-sub {
    font-size: 10px;
    text-transform: uppercase;
    letter-spacing: 0.15em;
    color: var(--text-faint);
    font-weight: 500;
  }

  /* === Переключатель режимов === */
  .mode-switcher {
    display: flex;
    border: 1px solid var(--text);
  }
  .mode-btn {
    padding: 9px 18px;
    font-size: 11px;
    text-transform: uppercase;
    letter-spacing: 0.12em;
    color: var(--text-muted);
    cursor: pointer;
    background: transparent;
    border: none;
    font-family: 'IBM Plex Sans', sans-serif;
    font-weight: 500;
    transition: all 0.15s;
  }
  .mode-btn:hover { color: var(--text); }
  .mode-btn.active {
    background: var(--text);
    color: var(--bg);
    cursor: default;
  }

  .masthead-date {
    font-size: 10px;
    text-transform: uppercase;
    letter-spacing: 0.15em;
    color: var(--text-faint);
    font-weight: 500;
    padding-bottom: 2px;
  }

  /* === Поиск === */
  .search-wrap {
    margin: 0 0 24px;
    display: flex;
    flex-wrap: wrap;
    align-items: stretch;
    gap: 8px;
  }
  .search-input {
    flex: 1 1 auto;
    min-width: 0;
    padding: 10px 16px;
    border: 1px solid var(--border-strong);
    background: var(--bg-card);
    font-family: 'IBM Plex Sans', sans-serif;
    font-size: 13px;
    color: var(--text);
    outline: none;
    text-align: left !important;
    direction: ltr;
    transition: border-color 0.15s, box-shadow 0.15s;
  }
  .search-input:focus {
    border-color: var(--accent);
    box-shadow: 0 0 0 2px var(--accent-soft);
  }
  .search-input::placeholder { color: var(--text-faint); }

  .search-clear {
    flex: 0 0 auto;
    background: var(--bg-card);
    border: 1px solid var(--border-strong);
    color: var(--text-faint);
    cursor: pointer;
    width: 40px;
    padding: 0;
    display: none;
    align-items: center;
    justify-content: center;
    transition: color 0.15s, border-color 0.15s, background 0.15s;
  }
  .search-clear:hover {
    color: var(--text);
    border-color: var(--text);
    background: var(--bg-hover);
  }
  .search-wrap.has-value .search-clear { display: flex; }

  .search-meta {
    flex: 1 0 100%;
    font-size: 10px;
    text-transform: uppercase;
    letter-spacing: 0.12em;
    color: var(--text-faint);
    margin-top: 0;
    min-height: 0;
  }
  .search-meta:empty { display: none; }

  /* === Двухколонная сетка === */
  .layout {
    display: grid;
    grid-template-columns: 220px 1fr;
    gap: 32px;
    min-height: 400px;
  }

  /* Sidebar */
  .sidebar {
    border-right: 1px solid var(--border-strong);
    padding-right: 20px;
  }
  .sidebar-label {
    font-size: 9px;
    text-transform: uppercase;
    letter-spacing: 0.18em;
    color: var(--text-faint);
    font-weight: 600;
    margin-bottom: 12px;
    padding-bottom: 8px;
    border-bottom: 1px solid var(--border);
  }
  .nav { list-style: none; }
  .nav-item {
    padding: 8px 12px 8px 0;
    font-size: 13.5px;
    font-weight: 500;
    color: var(--text-muted);
    cursor: pointer;
    display: flex;
    justify-content: space-between;
    align-items: baseline;
    border-bottom: 1px solid transparent;
    transition: color 0.1s;
  }
  .nav-item:hover { color: var(--text); }
  .nav-item.active {
    color: var(--text);
    border-bottom: 1px solid var(--accent);
    font-weight: 600;
  }
  .nav-item .count {
    font-size: 10px;
    color: #b0aba0;
    font-weight: 400;
    margin-left: 8px;
  }

  /* === Контентная зона === */
  .content-title {
    font-family: 'IBM Plex Serif', serif;
    font-weight: 700;
    font-size: 26px;
    margin-bottom: 4px;
    letter-spacing: -0.015em;
  }
  .content-sub {
    font-size: 10px;
    text-transform: uppercase;
    letter-spacing: 0.12em;
    color: var(--text-faint);
    margin-bottom: 18px;
    padding-bottom: 12px;
    border-bottom: 1px solid var(--border);
  }

  .tools {
    list-style: none;
    columns: 2;
    column-gap: 36px;
  }
  @media (max-width: 900px) { .tools { columns: 1; } }
  .tool {
    padding: 8px 0;
    border-bottom: 1px solid var(--border-soft);
    break-inside: avoid;
    display: flex;
    flex-direction: column;
  }
  .tool a {
    font-size: 13.5px;
    font-weight: 500;
    color: var(--text);
    text-decoration: none;
    transition: color 0.1s;
  }
  .tool a:hover { color: var(--accent); }
  .tool .note {
    font-family: 'IBM Plex Serif', serif;
    font-size: 12.5px;
    color: var(--text-muted);
    margin-top: 1px;
    line-height: 1.4;
  }

  /* === Поиск: результаты === */
  .search-results .mode-block { margin-bottom: 32px; }
  .search-results .mode-block:last-child { margin-bottom: 0; }
  .search-results .mode-block-header {
    display: flex;
    align-items: baseline;
    justify-content: space-between;
    margin-bottom: 16px;
    padding-bottom: 6px;
    border-bottom: 2px solid var(--text);
  }
  .search-results .mode-block-label {
    font-family: 'IBM Plex Serif', serif;
    font-weight: 700;
    font-size: 11px;
    text-transform: uppercase;
    letter-spacing: 0.2em;
    color: var(--text);
  }
  .search-results .mode-block-count {
    font-size: 10px;
    color: var(--text-faint);
    text-transform: uppercase;
    letter-spacing: 0.12em;
  }
  .search-results .result-group { margin-bottom: 20px; }
  .search-results .mode-block .result-group:last-child { margin-bottom: 0; }
  .search-results .group-title {
    font-family: 'IBM Plex Serif', serif;
    font-weight: 600;
    font-size: 16px;
    margin-bottom: 6px;
    color: var(--text);
  }
  .search-results .group-sub {
    font-size: 9px;
    text-transform: uppercase;
    letter-spacing: 0.15em;
    color: var(--text-faint);
    margin-bottom: 8px;
    padding-bottom: 6px;
    border-bottom: 1px solid var(--border);
  }
  .empty-state {
    color: var(--text-faint);
    font-style: italic;
    font-family: 'IBM Plex Serif', serif;
    font-size: 14px;
    padding: 30px 0;
    text-align: center;
  }

  /* === Подвал === */
  footer {
    text-align: center;
    margin-top: 36px;
    padding-top: 18px;
    border-top: 1px solid var(--border);
    color: var(--text-faint);
    font-size: 10px;
    text-transform: uppercase;
    letter-spacing: 0.15em;
  }

  /* Мобильный */
  @media (max-width: 720px) {
    body { padding: 24px 16px 50px; }
    .masthead { flex-direction: column; align-items: flex-start; gap: 16px; }
    .masthead-title { font-size: 28px; }
    .layout { grid-template-columns: 1fr; gap: 20px; }
    .sidebar {
      border-right: none;
      border-bottom: 1px solid var(--border-strong);
      padding-right: 0;
      padding-bottom: 12px;
    }
    .nav { display: flex; flex-wrap: wrap; gap: 4px; }
    .nav-item {
      padding: 6px 10px;
      border: 1px solid var(--border);
      background: var(--bg-card);
    }
    .nav-item.active {
      background: var(--text);
      color: var(--bg);
      border-color: var(--text);
    }
    .nav-item.active .count { color: var(--bg); opacity: 0.7; }
  }
</style>
</head>

// ============================================================
// СОСТОЯНИЕ
// ============================================================
let state = {
  mode: 'search',
  activeCat: DATA.search.categories[0].id,
  query: ''
};

// ============================================================
// УТИЛИТЫ
// ============================================================
function escapeHtml(s) {
  return String(s).replace(/[&<>"']/g, c => ({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c]));
}

// ============================================================
// РЕНДЕР
// ============================================================
function renderSidebar() {
  const modeData = DATA[state.mode];
  document.getElementById('sidebar-label').textContent = modeData.label;
  const nav = document.getElementById('nav');
  nav.innerHTML = modeData.categories.map(cat => `
    <li class="nav-item ${cat.id === state.activeCat ? 'active' : ''}" data-cat="${cat.id}">
      <span>${escapeHtml(cat.title)}</span>
      <span class="count">${cat.tools.length}</span>
    </li>
  `).join('');
  nav.querySelectorAll('.nav-item').forEach(li => {
    li.addEventListener('click', () => {
      state.activeCat = li.dataset.cat;
      renderSidebar();
      renderContent();
    });
  });
}

function renderContent() {
  const content = document.getElementById('content');

  if (state.query.trim()) {
    renderSearchResults(content);
    return;
  }

  const cat = DATA[state.mode].categories.find(c => c.id === state.activeCat);
  if (!cat) {
    content.innerHTML = '<div class="empty-state">раздел не выбран</div>';
    return;
  }

  content.innerHTML = `
    <div class="content-title">${escapeHtml(cat.title)}</div>
    <div class="content-sub">${escapeHtml(cat.subtitle)}</div>
    <ul class="tools">
      ${cat.tools.map(t => `
        <li class="tool">
          <a href="${escapeHtml(t.url)}" target="_blank" rel="noopener noreferrer">${escapeHtml(t.name)}</a>
          ${t.note ? `<div class="note">${escapeHtml(t.note)}</div>` : ''}
        </li>
      `).join('')}
    </ul>
  `;
}

function renderSearchResults(content) {
  const q = state.query.toLowerCase().trim();
  const modeBlocks = [];
  let totalCount = 0;

  // Иду по обоим режимам — сначала активный, потом второй
  const modeOrder = state.mode === 'search' ? ['search', 'visual'] : ['visual', 'search'];

  modeOrder.forEach(modeKey => {
    const modeData = DATA[modeKey];
    const modeLabel = modeKey === 'search' ? 'OSINT' : 'Визуализация';
    const groups = [];
    let modeCount = 0;

    modeData.categories.forEach(cat => {
      const matched = cat.tools.filter(t => {
        const haystack = (t.name + ' ' + (t.note || '')).toLowerCase();
        return haystack.includes(q);
      });
      if (matched.length) {
        groups.push({ cat, matched });
        modeCount += matched.length;
      }
    });

    if (groups.length) {
      modeBlocks.push({ modeKey, modeLabel, groups, modeCount });
      totalCount += modeCount;
    }
  });

  if (!modeBlocks.length) {
    content.innerHTML = `<div class="empty-state">по запросу «${escapeHtml(state.query)}» ничего не найдено</div>`;
    document.getElementById('search-meta').textContent = '';
    return;
  }

  content.innerHTML = `
    <div class="search-results">
      ${modeBlocks.map(mb => `
        <div class="mode-block">
          <div class="mode-block-header">
            <span class="mode-block-label">${escapeHtml(mb.modeLabel)}</span>
            <span class="mode-block-count">${mb.modeCount}</span>
          </div>
          ${mb.groups.map(g => `
            <div class="result-group">
              <div class="group-title">${escapeHtml(g.cat.title)}</div>
              <div class="group-sub">${escapeHtml(g.cat.subtitle)}</div>
              <ul class="tools">
                ${g.matched.map(t => `
                  <li class="tool">
                    <a href="${escapeHtml(t.url)}" target="_blank" rel="noopener noreferrer">${escapeHtml(t.name)}</a>
                    ${t.note ? `<div class="note">${escapeHtml(t.note)}</div>` : ''}
                  </li>
                `).join('')}
              </ul>
            </div>
          `).join('')}
        </div>
      `).join('')}
    </div>
  `;
  document.getElementById('search-meta').textContent = `найдено ${totalCount}`;
}

function setMode(mode) {
  if (state.mode === mode) return;
  state.mode = mode;
  state.activeCat = DATA[mode].categories[0].id;
  document.querySelectorAll('.mode-btn').forEach(b => {
    b.classList.toggle('active', b.dataset.mode === mode);
  });
  renderSidebar();
  renderContent();
  updateSearchMetaTotal();
}

function updateSearchMetaTotal() {
  // Дефолтный счётчик не показываем — только при активном поиске
  document.getElementById('search-meta').textContent = '';
}

function setDate() {
  const now = new Date();
  const d = String(now.getDate()).padStart(2, '0');
  const m = String(now.getMonth() + 1).padStart(2, '0');
  const y = now.getFullYear();
  document.getElementById('date').textContent = `${d} · ${m} · ${y}`;
}

document.addEventListener('DOMContentLoaded', () => {
  setDate();
  renderSidebar();
  renderContent();
  updateSearchMetaTotal();

  document.querySelectorAll('.mode-btn').forEach(btn => {
    btn.addEventListener('click', () => setMode(btn.dataset.mode));
  });

  const filterInput = document.getElementById('filter');
  const searchWrap = filterInput.closest('.search-wrap');
  const clearBtn = document.getElementById('search-clear');

  function clearSearch() {
    filterInput.value = '';
    state.query = '';
    searchWrap.classList.remove('has-value');
    renderContent();
    updateSearchMetaTotal();
    filterInput.focus();
  }

  function updateClearVisibility() {
    searchWrap.classList.toggle('has-value', !!filterInput.value);
  }

  filterInput.addEventListener('input', (e) => {
    state.query = e.target.value;
    updateClearVisibility();
    if (!state.query.trim()) {
      renderContent();
      updateSearchMetaTotal();
    } else {
      renderContent();
    }
  });

  // На случай если input event не сработает (например, вставка через JS)
  filterInput.addEventListener('keyup', updateClearVisibility);
  filterInput.addEventListener('change', updateClearVisibility);

  clearBtn.addEventListener('click', clearSearch);

  document.addEventListener('keydown', (e) => {
    if (e.key === 'Escape') {
      clearSearch();
    }
    if (e.key === '/' && document.activeElement.tagName !== 'INPUT') {
      e.preventDefault();
      filterInput.focus();
    }
  });
});
</script>
