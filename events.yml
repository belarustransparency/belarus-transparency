# Витрина событий — данные.
#
# Каждое событие — блок под `- slug:`.
# slug должен совпадать с именем .md-файла карточки события
# во всех локалях: docs/<lang>/events/<slug>.md
#
# Локализуемые поля имеют вложенные ключи ru/en/pl/lt.
# Если перевода нет — fallback на en, затем на ru.
#
# Не локализуются (одно значение):
#   slug, date_day, date_month, date_year, event_type, status,
#   place (если латиница типа "Варшава" → в RU кириллица,
#   в остальных языках перевод; делаем локализованным).
#
# Порядок блоков = порядок на витрине (новые события — сверху).

events:

  - slug: vybory-ks-2026
    event_type: election
    status: completed
    date_day: "11"
    date_month_key: may
    date_year: "26"
    title:
      ru: Выборы в Координационный совет — 4-й созыв
      en: Coordination Council elections — 4th convocation
      pl: Wybory do Rady Koordynacyjnej — IV kadencja
      lt: Koordinacinės tarybos rinkimai — IV kadencija
    summary:
      ru: Из 171 кандидата 130 шли по шести спискам, выстроенным вокруг сотрудников ОПК, Офиса Тихановской и НАУ. По итогам — 69 из 76 распределённых мест у офисных списков.
      en: Of 171 candidates, 130 ran on six lists built around staff of the UTC, the Tsikhanouskaya Office, and NAM. Result — 69 of 76 distributed seats went to the office lists.
      pl: Spośród 171 kandydatów 130 startowało z sześciu list zbudowanych wokół pracowników UTC, Biura Cichanouskiej i NAM. Wynik — 69 z 76 rozdzielonych miejsc dla list biurowych.
      lt: Iš 171 kandidato 130 dalyvavo šešiuose sąrašuose, sudarytuose aplink UTC, Cichanouskos biuro ir NAM darbuotojus. Rezultatas — 69 iš 76 paskirstytų vietų atiteko biurų sąrašams.
    place:
      ru: Онлайн
      en: Online
      pl: Online
      lt: Internetu

  - slug: fsm-grant-competition-2026
    event_type: grant
    status: active
    date_day: "26"
    date_month_key: mar
    date_year: "26"
    title:
      ru: Конкурс грантов FSM на беларуское направление, 2026
      en: FSM Grant Competition for Belarus, 2026
      pl: Konkurs grantowy FSM na rzecz Białorusi, 2026
      lt: FSM dotacijų konkursas Baltarusijos kryptimi, 2026
    summary:
      ru: Ежегодный конкурс Fundacji Solidarności Międzynarodowej с бюджетом 7,48 млн&nbsp;zł. Дедлайн заявок — 17 апреля, результаты — до 29 мая 2026. Размер гранта — от 500 000 до 1 000 000 zł.
      en: Annual competition of Fundacja Solidarności Międzynarodowej with a budget of 7.48&nbsp;million&nbsp;PLN. Application deadline — April 17, results — by May 29, 2026. Grant size — from 500,000 to 1,000,000 PLN.
      pl: Coroczny konkurs Fundacji Solidarności Międzynarodowej z budżetem 7,48&nbsp;mln&nbsp;zł. Termin składania wniosków — 17 kwietnia, wyniki — do 29 maja 2026. Wielkość grantu — od 500 000 do 1 000 000 zł.
      lt: Kasmetinis Fundacja Solidarności Międzynarodowej konkursas, kurio biudžetas — 7,48&nbsp;mln.&nbsp;zł. Paraiškų pateikimo terminas — balandžio 17 d., rezultatai — iki 2026 m. gegužės 29 d. Dotacijos dydis — nuo 500 000 iki 1 000 000 zł.
    place:
      ru: Варшава, Польша
      en: Warsaw, Poland
      pl: Warszawa, Polska
      lt: Varšuva, Lenkija

  - slug: abba-brussels-2025-04-24
    event_type: meeting
    status: completed
    date_day: "24"
    date_month_key: apr
    date_year: "25"
    title:
      ru: Презентация Working Paper 143 в Eurochambres
      en: Presentation of Working Paper 143 at Eurochambres
      pl: Prezentacja Working Paper 143 w Eurochambres
      lt: Working Paper 143 pristatymas Eurochambres
    summary:
      ru: Совместная встреча CASE и ABBA с представителем Еврокомиссии в офисе Eurochambres. Презентация Working Paper №143 — через 8 месяцев после завершения работы и через 3 месяца после получения консорциумом во главе с Eurochambres нового €3 млн гранта ЕК на BDI.
      en: Joint meeting of CASE and ABBA with a European Commission representative at the Eurochambres office. Presentation of Working Paper №143 — 8 months after the work was completed and 3 months after a Eurochambres-led consortium received a new €3M EC grant for BDI.
      pl: Wspólne spotkanie CASE i ABBA z przedstawicielem Komisji Europejskiej w biurze Eurochambres. Prezentacja Working Paper №143 — 8 miesięcy po zakończeniu prac i 3 miesiące po otrzymaniu przez konsorcjum pod przewodnictwem Eurochambres nowego grantu KE w wysokości €3 mln na BDI.
      lt: Bendras CASE ir ABBA susitikimas su Europos Komisijos atstovu Eurochambres biure. Working Paper №143 pristatymas — praėjus 8 mėnesiams po darbo pabaigos ir 3 mėnesiams po to, kai Eurochambres vadovaujamas konsorciumas gavo naują €3 mln EK dotaciją BDI.
    place:
      ru: Брюссель, Бельгия
      en: Brussels, Belgium
      pl: Bruksela, Belgia
      lt: Briuselis, Belgija

  - slug: fsm-grant-competition-2023
    event_type: grant
    status: completed
    date_day: "18"
    date_month_key: may
    date_year: "23"
    title:
      ru: Конкурс грантов FSM на беларуское направление, 2023
      en: FSM Grant Competition for Belarus, 2023
      pl: Konkurs grantowy FSM na rzecz Białorusi, 2023
      lt: FSM dotacijų konkursas Baltarusijos kryptimi, 2023
    summary:
      ru: Fundacja Solidarności Międzynarodowej распределила ≈ 2,07 млн&nbsp;zł между пятью получателями. Крупнейший индивидуальный грант — 980 000 zł, или 47,3% бюджета, — присуждён Fundacji Białoruś Przyszłości.
      en: Fundacja Solidarności Międzynarodowej distributed ≈ 2.07&nbsp;million&nbsp;PLN among five recipients. The largest individual grant — 980,000&nbsp;PLN, or 47.3% of the budget — was awarded to Fundacja Białoruś Przyszłości.
      pl: Fundacja Solidarności Międzynarodowej rozdzieliła ≈ 2,07&nbsp;mln&nbsp;zł między pięcioma beneficjentami. Największy indywidualny grant — 980 000 zł, czyli 47,3% budżetu — otrzymała Fundacja Białoruś Przyszłości.
      lt: Fundacja Solidarności Międzynarodowej paskirstė ≈ 2,07&nbsp;mln.&nbsp;zł penkiems gavėjams. Didžiausia individuali dotacija — 980 000 zł, arba 47,3% biudžeto — paskirta Fundacji Białoruś Przyszłości.
    place:
      ru: Варшава, Польша
      en: Warsaw, Poland
      pl: Warszawa, Polska
      lt: Varšuva, Lenkija

