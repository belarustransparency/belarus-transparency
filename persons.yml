# === UI элементы витрины ===

ui:
  kicker:
    ru: Раздел
    en: Section
    pl: Sekcja
    lt: Skiltis
  h1:
    ru: Персоналии
    en: Persons
    pl: Osoby
    lt: Asmenys
  lede:
    ru: Карточки публичных фигур и связанных лиц с указанием функциональной роли и структурной позиции в основной организации. Используйте фильтр для отбора по типу деятельности.
    en: Profiles of public figures and related individuals, indicating their functional role and structural position in the primary organization. Use the filter to sort by activity type.
    pl: Karty postaci publicznych i osób powiązanych z określeniem ich roli funkcyjnej i pozycji strukturalnej w głównej organizacji. Użyj filtra, aby wybrać typ działalności.
    lt: Viešų figūrų ir susijusių asmenų kortelės su jų funkcine veikla ir struktūrine pozicija pagrindinėje organizacijoje. Naudokite filtrą norėdami atrinkti pagal veiklos tipą.
