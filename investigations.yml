# Витрина расследований — данные.
# Каждая карточка — блок полей, начинающийся с "- code:".
# Чтобы добавить новое расследование — скопируй блок одного из существующих
# и поменяй значения. Порядок блоков в файле = порядок на витрине.

investigations:

  - code: CASE-001
    href: bialorus-przyszlosci-fsm/
    title: Фонд "Беларусь будущего"
    lede: >-

      Польша в 2023 году выделила частной организации грант 980 000 zł на "Дорожную карту" по защите прав человека.
      Органы управления и надзора фонда состоят из сотрудников и членов семьи заместителя главы ОПК Павла Латушко.
      Устав организации, финансовая отчётность скрыты или отсутствуют.

    date: май 2026
    status: published     # published | collecting | draft
    tags:                 # видимые теги (можно по-русски)
      - Польша
      - Эпизод
      - Коррупция
    filter_tags:          # технические теги для фильтра (латиницей, lowercase)
      - democracy
    grants_eur: 0.22      # сумма в млн €
    grants_pct: 1         # процент от 170 млн € (бюджет ЕС 2020–2024)
    cover: "/assets/covers/brukhan.webp"
    cover_gradient: "linear-gradient(135deg, #4a3d35 0%, #20191a 100%)"

  - code: CASE-002
    href: imaguru/
    title: "Imaguru / Belbiz — гранты ЕК 2022–2025"
    lede: >-
      Сеть фондов в Литве, Латвии, Польше и Испании c одним бенефициаром - Татьяной Маринич. В 2022 году получила грант
      Еврокомиссии на 2 000 000 €. С 2025 года - участник Belarusian Diaspora Initiative с 3 000 000 €. 
      Отчётность - отсутствует, фонд - получатель гранта ЕК спешно ликвидирован.
    date: май 2026
    status: collecting
    tags:
      - ЕК
      - Деятельность
      - Лоббизм
    filter_tags:
      - business
    grants_eur: 5.06
    grants_pct: 3
    cover: "/assets/covers/marinich.webp"
    cover_gradient: "linear-gradient(135deg, #2c3540 0%, #161c24 100%)"

  - code: CASE-003
    href: abba/
    title: "ABBA - Ассоциации белорусского бизнеса за рубежом"
    lede: >-
      Сеть частных организаций, получивших в 2022-2024 - 1 050 000 € от Еврокомиссии и 1 000 000 $ от американских доноров. 
      С 2025 года - участник Belarusian Diaspora Initiative с 3 000 000 €. Беларускому бизнесу выдано не более 100 000 €. 
      Устав не опубликован, аудит не проводился.
    date: май 2026
    status: collecting
    tags:
      - США
      - ЕК
      - Деятельность
      - Лоббизм
    filter_tags:
      - business
    grants_eur: 4.98
    grants_pct: 3
    cover: "/assets/covers/alekhnovich.webp"
    cover_gradient: "linear-gradient(135deg, #3d3530 0%, #20191a 100%)"


# === Список фильтров сверху витрины ===
# Каждый фильтр — пара "ключ : подпись".
# Ключ должен совпадать с одним из filter_tags выше.
# "all" — обязательный первый, остальные в любом порядке.

filters:
  all: Все
  business: Бизнес
  democracy: Гражданское общество
  political_prisoners: Политзаключённые
  media: Медиа
  culture: Культура
  relocation: Релокация