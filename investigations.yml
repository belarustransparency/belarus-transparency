# Витрина расследований — данные.
# Каждая карточка — блок полей, начинающийся с "- code:".
# Чтобы добавить новое расследование — скопируй блок одного из существующих
# и поменяй значения. Порядок блоков в файле = порядок на витрине.

investigations:

  - code: BT-001
    href: opk-grants-2022-2025/
    title: "Куда уходят гранты ОПК: реконструкция расходов 2022–2025"
    lede: Структура расходов Офиса Тихановской и связанных НКО по отчётам грантодателей.
    date: март 2026
    status: published     # published | collecting | draft
    tags:                 # видимые теги (можно по-русски)
      - ОПК
      - Финансы
      - Литва
    filter_tags:          # технические теги для фильтра (латиницей, lowercase)
      - opk
      - finansy
      - litva
    grants_eur: 135       # сумма в млн €
    grants_pct: 18        # процент от 750 млн € (должен совпадать с грубой математикой выше)
    cover: "/assets/covers/brukhan.webp"             # путь к фото-обложке, или пусто для тёмной плашки
    cover_gradient: "linear-gradient(135deg, #4a3d35 0%, #20191a 100%)"

  - code: BT-002
    href: media-eu-funding/
    title: "Медиа в эмиграции: кто получил деньги ЕС и за какой контент"
    lede: Кто из беларуских редакций получал финансирование через EED, NED и USAID, в каких суммах и под какие KPI.
    date: апрель 2026
    status: collecting
    tags:
      - Медиа
      - Финансы
    filter_tags:
      - media
      - finansy
    grants_eur: 90
    grants_pct: 12
    cover: ""
    cover_gradient: "linear-gradient(135deg, #2c3540 0%, #161c24 100%)"

  - code: BT-003
    href: ngo-lithuania/
    title: "Карта беларуских НКО в Литве: учредители, бюджеты, пересечения"
    lede: 31 организация зарегистрирована беларусами в Литве с 2020 года.
    date: в работе
    status: draft
    tags:
      - НКО в эмиграции
      - Литва
    filter_tags:
      - ngo
      - litva
    grants_eur: 53
    grants_pct: 7
    cover: ""
    cover_gradient: "linear-gradient(135deg, #3d3530 0%, #20191a 100%)"


# === Список фильтров сверху витрины ===
# Каждый фильтр — пара "ключ : подпись".
# Ключ должен совпадать с одним из filter_tags выше.
# "all" — обязательный первый, остальные в любом порядке.

filters:
  all: Все
  opk: ОПК
  media: Медиа
  ngo: НКО в эмиграции
  finansy: Финансы
  litva: Литва
