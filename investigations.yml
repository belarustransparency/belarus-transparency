  - # --- ВИТРИНА ---
    code: CASE-004
    href: byculture/
    status: active
    date:
      ru: май 2026
      en: May 2026
      pl: maj 2026
      lt: 2026 m. gegužė
    cover: "/assets/covers/budkin.webp"
    cover_gradient: "linear-gradient(135deg, #2a3535 0%, #141c1c 100%)"

    # --- ТЕКСТЫ ---
    title:
      ru: Рада Культуры: публичная миссия, семейная касса
      en: Culture Council: Public Mission, Family Cash
      pl: Rada Kultury: misja publiczna, kasa rodzinna
      lt: Kultūros taryba: vieša misija, šeimos kasa
    lede:
      ru: >-
        Беларуская культура в эмиграции получила грантовую инфраструктуру. Вопрос в том, кому она принадлежит:
        крупнейший её оператор — MTÜ с нулевым штатом и 13 аффилированными юрлицами.
        €2&nbsp;млн на культуру прошли через жилой адрес семьи Морозовых в Таллине — семьи, которой в публичных источниках практически не существует.
      en: >-
        An Estonian MTÜ positions itself as the main institution of Belarusian culture in exile,
        with the ArtPower programme budgeted at €2&nbsp;million. With a 2024 turnover of €737K — zero staff,
        99.9% of expenses hidden in a single line, control concentrated in a family couple across 13 legal entities.
      pl: >-
        Estońskie MTÜ pozycjonuje się jako główna instytucja kultury białoruskiej na emigracji
        z programem ArtPower o budżecie 2&nbsp;mln&nbsp;€. Przy obrotach €737&nbsp;tys. w 2024 roku — zerowe zatrudnienie,
        99,9% wydatków ukrytych w jednej pozycji, kontrola skupiona w rękach małżeństwa poprzez 13 podmiotów prawnych.
      lt: >-
        Estijos MTÜ pozicionuoja save kaip pagrindinę baltarusių kultūros tremtyje instituciją
        su ArtPower programa, kurios biudžetas — 2&nbsp;mln.&nbsp;€. 2024&nbsp;m. apyvarta €737&nbsp;tūkst. — nulis darbuotojų,
        99,9% išlaidų paslėpta vienoje eilutėje, kontrolė sutelkta šeimos poros rankose per 13 juridinių asmenų.
    tags:
      ru: [Эстония, Культура, Семейный бизнес]
      en: [Estonia, Culture, Family business]
      pl: [Estonia, Kultura, Biznes rodzinny]
      lt: [Estija, Kultūra, Šeimos verslas]
    filter_tags:
      - culture

