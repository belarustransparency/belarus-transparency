  - # --- ВИТРИНА ---
    code: CASE-002
    href: abba/
    status: active       # published | active | draft
    date:
      ru: май 2026
      en: May 2026
      pl: maj 2026
      lt: 2026 m. gegužė
    cover: "/assets/covers/alekhnovich.webp"
    cover_gradient: "linear-gradient(135deg, #3d3530 0%, #20191a 100%)"

    # --- ТЕКСТЫ ---
    title:
      ru: "ABBA — Ассоциации белорусского бизнеса за рубежом"
      en: "ABBA — Associations of Belarusian Business Abroad"
      pl: "ABBA — Stowarzyszenia Białoruskiego Biznesu za Granicą"
      lt: "ABBA — Baltarusių verslo užsienyje asociacijos"
    lede:
      ru: >-
        Сеть частных организаций, получивших в 2022-2024 годах - 1.05&nbsp;млн&nbsp;€ от Еврокомиссии и ~1&nbsp;млн&nbsp;$ от американских доноров.
        Сейчас - участник Belarusian Diaspora Initiative с фондом 3&nbsp;млн&nbsp;€. Беларускому бизнесу выдано не более 100 тысяч&nbsp;€.
        Устав не опубликован, аудит не проводился.
      en: >-
        A network of private organizations that received €1.05&nbsp;million from the European Commission and ~$1&nbsp;million from US donors in 2022–2024.
        Now a participant in the Belarusian Diaspora Initiative with a €3&nbsp;million fund. No more than €100,000 has been distributed to Belarusian businesses.
        Bylaws have not been published; no audit has been conducted.
      pl: >-
        Sieć prywatnych organizacji, które w latach 2022–2024 otrzymały 1,05&nbsp;mln&nbsp;€ od Komisji Europejskiej i ~1&nbsp;mln&nbsp;$ od darczyńców amerykańskich.
        Obecnie uczestnik Belarusian Diaspora Initiative z funduszem 3&nbsp;mln&nbsp;€. Białoruskiemu biznesowi przekazano nie więcej niż 100&nbsp;tys.&nbsp;€.
        Statut nie został opublikowany, audyt nie był przeprowadzany.
      lt: >-
        Privačių organizacijų tinklas, 2022–2024&nbsp;m. gavęs 1,05&nbsp;mln.&nbsp;€ iš Europos Komisijos ir ~1&nbsp;mln.&nbsp;$ iš JAV donorų.
        Šiuo metu dalyvauja Belarusian Diaspora Initiative su 3&nbsp;mln.&nbsp;€ fondu. Baltarusių verslui paskirstyta ne daugiau kaip 100&nbsp;tūkst.&nbsp;€.
        Įstatai nepaskelbti, auditas neatliktas.
    tags:
      ru: [США, Европа, Имитация, Лоббизм]
      en: [USA, Europe, Imitations, Lobbying]
      pl: [USA, KE, Działalność, Lobbing]
      lt: [JAV, EK, Veikla, Lobizmas]
    filter_tags:
      - business

