site_name: Belarus Transparency
site_url: https://belarus-transparency.org/
use_directory_urls: true
site_description: Исследовательский проект о динамике беларуской оппозиции
site_author: Belarus Transparency Project

theme:
  name: material
  language: ru
  palette:
    - scheme: default
      toggle:
        icon: material/brightness-7
        name: Тёмная тема
    - scheme: slate
      toggle:
        icon: material/brightness-4
        name: Светлая тема
  features:
    - navigation.tabs
    - navigation.sections
    - navigation.top
    - search.highlight
    - search.share
    - content.code.copy

plugins:
  - search:
      lang: ru

markdown_extensions:
  - pymdownx.superfences:
      custom_fences:
        - name: mermaid
          class: mermaid
          format: !!python/name:pymdownx.superfences.fence_code_format
  - pymdownx.tabbed
  - admonition
  - toc:
      permalink: true

nav:
  - Главная: index.md
  - Расследования: ru/investigations/index.md
  - Персоналии: ru/persons/index.md
  - Организации: ru/organizations/index.md
  - События: ru/events/index.md
  - English: en/index.md

extra:
  social:
    - icon: fontawesome/brands/github
      link: https://github.com/belarustransparency