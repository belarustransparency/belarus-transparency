site_name: Belarus Transparency
site_url: https://belarus-transparency.org/
use_directory_urls: true
site_description: Исследовательский проект по проблемам развития номинальной беларуской "оппозиции"
site_author: Belarus Transparency Project

theme:
  name: material
  custom_dir: overrides
  language: ru
  font: false
  logo: assets/logo-horizontal-ru-light.svg
  favicon: assets/favicon.svg
  palette:
    - scheme: default
      primary: custom
      accent: custom
      toggle:
        icon: bt/theme-toggle-light
        name: Тёмная тема
    - scheme: slate
      primary: custom
      accent: custom
      toggle:
        icon: bt/theme-toggle-dark
        name: Светлая тема
  features:
    - navigation.tabs
    - navigation.sections
    - navigation.top
    - search.highlight
    - search.share
    - content.code.copy

extra_css:
  - stylesheets/extra.css

extra_javascript:
  - javascripts/external-links.js
  - javascripts/dashboard-kc-2026.js

nav:
  - Главная: ru/index.md
  - Кейсы: ru/investigations/index.md
  - Персоналии: ru/persons/index.md
  - Организации: ru/organizations/index.md
  - События: ru/events/index.md
  - Дашборды: ru/dashboards/index.md
  - Архив: ru/archive/index.md

plugins:
  - search:
      lang: ru
  - macros:
      module_name: main

markdown_extensions:
  - attr_list
  - md_in_html
  - pymdownx.superfences:
      custom_fences:
        - name: mermaid
          class: mermaid
          format: !!python/name:pymdownx.superfences.fence_code_format
  - pymdownx.tabbed
  - pymdownx.emoji:
      emoji_index: !!python/name:material.extensions.emoji.twemoji
      emoji_generator: !!python/name:material.extensions.emoji.to_svg
  - admonition
  - toc:
      permalink: true

extra:
  alternate:
    - name: Русский
      link: /ru/
      lang: ru
    - name: English
      link: /en/
      lang: en
    - name: Polski
      link: /pl/
      lang: pl
    - name: Lietuvių
      link: /lt/
      lang: lt
  generator: false